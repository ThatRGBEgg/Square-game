    <script>
        const audioPlayer = document.getElementById('audio-player');
        const folderInput = document.getElementById('folder-input');
        const btnLoadFolder = document.getElementById('btn-load-folder');
        
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const coverImage = document.getElementById('cover-image');
        const defaultArtIcon = document.getElementById('default-art-icon');
        
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const btnShuffle = document.getElementById('btn-shuffle');
        const btnRepeat = document.getElementById('btn-repeat');
        const repeatBadge = document.getElementById('repeat-one-badge');
        
        const progressFill = document.getElementById('progress-fill');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');

        // -- Data States --
        let originalPlaylist = []; 
        let playbackQueue = [];    
        let queueIndex = 0;        
        let isPlaying = false;
        
        let isShuffle = false;
        let repeatMode = 0; 

        // -- OS MEDIA SESSION SETUP --
        if ('mediaSession' in navigator) {
            navigator.mediaSession.setActionHandler('play', () => { if(!isPlaying) playBtn.click(); });
            navigator.mediaSession.setActionHandler('pause', () => { if(isPlaying) playBtn.click(); });
            navigator.mediaSession.setActionHandler('previoustrack', () => playPrev());
            navigator.mediaSession.setActionHandler('nexttrack', () => playNext(false));
        }

        function updateOSPlayer(title, artist, album, artworkUrl) {
            if ('mediaSession' in navigator) {
                const artworkArray = artworkUrl ? [{ src: artworkUrl, sizes: '512x512', type: 'image/jpeg' }] : [];
                navigator.mediaSession.metadata = new MediaMetadata({
                    title: title || 'Unknown Title',
                    artist: artist || 'Unknown Artist',
                    album: album || 'Nebula Player',
                    artwork: artworkArray
                });
            }
        }

        // Handle Folder Load
        btnLoadFolder.addEventListener('click', () => folderInput.click());

        folderInput.addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            originalPlaylist = files.filter(file => file.type.startsWith('audio/'));
            
            if (originalPlaylist.length > 0) {
                buildQueue();
                queueIndex = 0;
                loadTrack(playbackQueue[queueIndex]);
            } else {
                alert("No audio files found in that folder!");
            }
        });

        // Build/Rebuild the Playback Queue
        function buildQueue() {
            let currentTrackIndex = playbackQueue.length > 0 ? playbackQueue[queueIndex] : 0;
            playbackQueue = Array.from({length: originalPlaylist.length}, (_, i) => i);

            if (isShuffle) {
                playbackQueue = playbackQueue.filter(i => i !== currentTrackIndex);
                for (let i = playbackQueue.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [playbackQueue[i], playbackQueue[j]] = [playbackQueue[j], playbackQueue[i]];
                }
                playbackQueue.unshift(currentTrackIndex);
                queueIndex = 0;
            } else {
                queueIndex = currentTrackIndex;
            }
        }

        // Load specific track
        function loadTrack(fileIndex) {
            if (originalPlaylist.length === 0) return;
            const file = originalPlaylist[fileIndex];
            
            audioPlayer.src = URL.createObjectURL(file);

            // Default Fallback Info
            let cleanName = file.name.replace(/\.[^/.]+$/, "").replace(/_/g, " ");
            let currentTitle = cleanName;
            let currentArtist = "Unknown Artist";
            let currentAlbum = "Nebula Player";
            let currentArtUrl = null;

            trackTitle.innerText = currentTitle;
            trackArtist.innerText = currentArtist;
            coverImage.style.display = 'none';
            defaultArtIcon.style.display = 'block';

            // Extract Metadata & Album Art
            if (window.jsmediatags) {
                window.jsmediatags.read(file, {
                    onSuccess: function(tag) {
                        const tags = tag.tags;
                        if (tags.title) { currentTitle = tags.title; trackTitle.innerText = currentTitle; }
                        if (tags.artist) { currentArtist = tags.artist; trackArtist.innerText = currentArtist; }
                        if (tags.album) { currentAlbum = tags.album; }
                        
                        if (tags.picture) {
                            let base64String = "";
                            for (let i = 0; i < tags.picture.data.length; i++) {
                                base64String += String.fromCharCode(tags.picture.data[i]);
                            }
                            currentArtUrl = "data:" + tags.picture.format + ";base64," + window.btoa(base64String);
                            coverImage.src = currentArtUrl;
                            coverImage.style.display = 'block';
                            defaultArtIcon.style.display = 'none';
                        }
                        
                        // Send data to iOS/Android
                        updateOSPlayer(currentTitle, currentArtist, currentAlbum, currentArtUrl);
                    },
                    onError: function(error) {
                        console.log("No ID3 tags found.");
                        // Send default data to iOS/Android if extraction fails
                        updateOSPlayer(currentTitle, currentArtist, currentAlbum, null);
                    }
                });
            } else {
                updateOSPlayer(currentTitle, currentArtist, currentAlbum, null);
            }

            if (isPlaying) audioPlayer.play();
        }

        // Play / Pause
        playBtn.addEventListener('click', () => {
            if (originalPlaylist.length === 0) return;
            if (isPlaying) {
                audioPlayer.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                audioPlayer.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
            isPlaying = !isPlaying;
        });

        // Next / Previous Logic
        function playNext(isAuto = false) {
            if (originalPlaylist.length === 0) return;
            
            if (isAuto && repeatMode === 2) {
                audioPlayer.currentTime = 0;
                audioPlayer.play();
                return;
            }

            queueIndex++;
            if (queueIndex >= playbackQueue.length) {
                if (repeatMode === 1) {
                    queueIndex = 0;
                } else {
                    queueIndex = playbackQueue.length - 1;
                    audioPlayer.pause();
                    isPlaying = false;
                    playIcon.style.display = 'block';
                    pauseIcon.style.display = 'none';
                    return;
                }
            }
            loadTrack(playbackQueue[queueIndex]);
            if (isPlaying) audioPlayer.play();
        }

        function playPrev() {
            if (originalPlaylist.length === 0) return;
            
            if (audioPlayer.currentTime > 3) {
                audioPlayer.currentTime = 0;
                return;
            }

            queueIndex--;
            if (queueIndex < 0) {
                queueIndex = repeatMode === 1 ? playbackQueue.length - 1 : 0;
            }
            loadTrack(playbackQueue[queueIndex]);
            if (isPlaying) audioPlayer.play();
        }

        btnNext.addEventListener('click', () => playNext(false));
        btnPrev.addEventListener('click', () => playPrev());
        audioPlayer.addEventListener('ended', () => playNext(true));

        // Shuffle Toggle
        btnShuffle.addEventListener('click', () => {
            if (originalPlaylist.length === 0) return;
            isShuffle = !isShuffle;
            btnShuffle.classList.toggle('active-mode', isShuffle);
            buildQueue(); 
        });

        // Repeat Toggle 
        btnRepeat.addEventListener('click', () => {
            repeatMode = (repeatMode + 1) % 3;
            if (repeatMode === 0) {
                btnRepeat.classList.remove('active-mode');
                repeatBadge.style.display = 'none';
            } else if (repeatMode === 1) {
                btnRepeat.classList.add('active-mode');
                repeatBadge.style.display = 'none';
            } else if (repeatMode === 2) {
                btnRepeat.classList.add('active-mode');
                repeatBadge.style.display = 'block';
            }
        });

        // Progress Bar
        audioPlayer.addEventListener('timeupdate', () => {
            if (!audioPlayer.duration) return;
            const progressPercent = (audioPlayer.currentTime / audioPlayer.duration) * 100;
            progressFill.style.width = `${progressPercent}%`;
            currentTimeEl.innerText = formatTime(audioPlayer.currentTime);
            durationTimeEl.innerText = formatTime(audioPlayer.duration);
        });

        progressContainer.addEventListener('click', (e) => {
            if(originalPlaylist.length === 0 || !audioPlayer.duration) return;
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            audioPlayer.currentTime = (clickX / width) * audioPlayer.duration;
        });

        function formatTime(seconds) {
            if (isNaN(seconds)) return "0:00";
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }
    </script>
