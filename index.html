<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nebula Player</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;600&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background: url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=1000&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; 
        }

        .player-container {
            width: 100%;
            max-width: 450px;
            height: 100vh; 
            background: rgba(5, 5, 20, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: flex;
            flex-direction: column;
            padding: 40px 25px 30px;
            box-shadow: inset 0 0 50px rgba(0, 255, 255, 0.05);
        }

        svg {
            fill: currentColor;
            width: 24px;
            height: 24px;
            cursor: pointer;
            transition: opacity 0.2s ease, transform 0.1s ease;
        }
        
        svg:active { transform: scale(0.9); }

        /* 1. Header Section */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 40px;
        }
        .header-title { font-weight: 300; font-size: 0.75rem; }

        /* 2. Album Art Section */
        .album-art-area {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 255, 0.1);
            margin-bottom: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: rgba(255, 255, 255, 0.3);
        }
        .album-art-area svg { width: 64px; height: 64px; opacity: 0.5; }

        /* 3. Track Info Section */
        .track-info { margin-bottom: 30px; }
        .track-title {
            font-size: 1.6rem;
            font-weight: 600;
            margin-bottom: 8px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .track-artist {
            font-size: 1.1rem;
            color: #00ffff;
            opacity: 0.8;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.4);
        }

        /* 4. Progress Bar Section */
        .progress-container { margin-bottom: 35px; cursor: pointer; }
        .progress-bar-bg {
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            position: relative;
        }
        .progress-bar-fill {
            width: 0%;
            height: 100%;
            background: #00ffff;
            border-radius: 2px;
            box-shadow: 0 0 10px #00ffff;
            transition: width 0.1s linear;
        }
        .time-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 10px;
        }

        /* 5. Main Controls Section */
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .control-btn {
            color: rgba(255, 255, 255, 0.8);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .control-btn svg { width: 28px; height: 28px; }
        .play-pause {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: #00ffff;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        .play-pause svg {
            width: 36px;
            height: 36px;
            fill: #000;
        }

        /* 6. Footer Section */
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: auto;
            padding-top: 20px;
            color: rgba(255, 255, 255, 0.6);
        }
        .footer svg { width: 20px; height: 20px; }
    </style>
</head>
<body>

    <audio id="audio-player"></audio>
    <input type="file" id="folder-input" webkitdirectory directory multiple accept="audio/*" style="display: none;">

    <div class="player-container">
        
        <div class="header">
            <svg viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6 1.41-1.41z"/></svg>
            <div class="header-title">Playing from Local Nebula</div>
            <svg viewBox="0 0 24 24"><path d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
        </div>

        <div class="album-art-area">
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>

        <div class="track-info">
            <div class="track-title" id="track-title">No Audio Loaded</div>
            <div class="track-artist" id="track-artist">Select a folder below</div>
        </div>

        <div class="progress-container" id="progress-container">
            <div class="progress-bar-bg">
                <div class="progress-bar-fill" id="progress-fill"></div>
            </div>
            <div class="time-info">
                <span id="current-time">0:00</span>
                <span id="duration-time">0:00</span>
            </div>
        </div>

        <div class="controls">
            <div class="control-btn" id="btn-shuffle"><svg viewBox="0 0 24 24"><path d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 9.41l-1.41 1.41 3.13 3.13L14.5 20H20v-5.5l-2.04 2.04-3.13-3.13z"/></svg></div>
            
            <div class="control-btn" id="btn-prev"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></div>
            
            <div class="control-btn play-pause" id="btn-play">
                <svg id="play-icon" style="margin-left: 4px;" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                <svg id="pause-icon" style="display: none;" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
            </div>
            
            <div class="control-btn" id="btn-next"><svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg></div>
            
            <div class="control-btn" id="btn-repeat"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg></div>
        </div>

        <div class="footer">
            <div id="btn-load-folder" title="Load Folder" style="cursor: pointer;">
                <svg viewBox="0 0 24 24"><path d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm0 12H4V8h16v10z"/></svg>
            </div>
            <svg viewBox="0 0 24 24"><path d="M15 6H3v2h12V6zm0 4H3v2h12v-2zM3 16h8v-2H3v2zM17 6v8.18c-.31-.11-.65-.18-1-.18-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3V8h3V6h-5z"/></svg>
        </div>

    </div>

    <script>
        // -- Core Elements --
        const audioPlayer = document.getElementById('audio-player');
        const folderInput = document.getElementById('folder-input');
        const btnLoadFolder = document.getElementById('btn-load-folder');
        
        // -- UI Elements --
        const trackTitle = document.getElementById('track-title');
        const trackArtist = document.getElementById('track-artist');
        const playBtn = document.getElementById('btn-play');
        const playIcon = document.getElementById('play-icon');
        const pauseIcon = document.getElementById('pause-icon');
        const btnNext = document.getElementById('btn-next');
        const btnPrev = document.getElementById('btn-prev');
        const progressFill = document.getElementById('progress-fill');
        const progressContainer = document.getElementById('progress-container');
        const currentTimeEl = document.getElementById('current-time');
        const durationTimeEl = document.getElementById('duration-time');

        // -- State Variables --
        let playlist = [];
        let currentIndex = 0;
        let isPlaying = false;

        // 1. Trigger the hidden folder input when clicking the folder icon
        btnLoadFolder.addEventListener('click', () => {
            folderInput.click();
        });

        // 2. Handle files when a folder is selected
        folderInput.addEventListener('change', (event) => {
            const files = Array.from(event.target.files);
            // Filter only audio files
            playlist = files.filter(file => file.type.startsWith('audio/'));
            
            if (playlist.length > 0) {
                currentIndex = 0;
                loadTrack(currentIndex);
            } else {
                alert("No audio files found in that folder!");
            }
        });

        // 3. Load a specific track
        function loadTrack(index) {
            const file = playlist[index];
            if (!file) return;

            // Create a temporary local URL for the file
            const objectURL = URL.createObjectURL(file);
            audioPlayer.src = objectURL;

            // Update UI (Basic filename parsing since we don't have an ID3 tag library)
            let rawName = file.name.replace(/\.[^/.]+$/, ""); // Remove extension
            let parts = rawName.split('-');
            
            if(parts.length > 1) {
                trackArtist.innerText = parts[0].trim();
                trackTitle.innerText = parts[1].trim();
            } else {
                trackTitle.innerText = rawName;
                trackArtist.innerText = "Local Audio";
            }

            // Auto-play if we switch tracks
            if (isPlaying) {
                audioPlayer.play();
            }
        }

        // 4. Play / Pause Logic
        playBtn.addEventListener('click', () => {
            if (playlist.length === 0) return; // Do nothing if empty
            
            if (isPlaying) {
                audioPlayer.pause();
                playIcon.style.display = 'block';
                pauseIcon.style.display = 'none';
            } else {
                audioPlayer.play();
                playIcon.style.display = 'none';
                pauseIcon.style.display = 'block';
            }
            isPlaying = !isPlaying;
        });

        // 5. Next and Prev Tracks
        btnNext.addEventListener('click', () => {
            currentIndex = (currentIndex + 1) % playlist.length;
            loadTrack(currentIndex);
        });

        btnPrev.addEventListener('click', () => {
            currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
            loadTrack(currentIndex);
        });

        // Auto-play next track when current ends
        audioPlayer.addEventListener('ended', () => {
            btnNext.click();
        });

        // 6. Update Progress Bar
        audioPlayer.addEventListener('timeupdate', () => {
            const currentTime = audioPlayer.currentTime;
            const duration = audioPlayer.duration;
            
            if (duration) {
                const progressPercent = (currentTime / duration) * 100;
                progressFill.style.width = `${progressPercent}%`;
                currentTimeEl.innerText = formatTime(currentTime);
                durationTimeEl.innerText = formatTime(duration);
            }
        });

        // 7. Click to seek on progress bar
        progressContainer.addEventListener('click', (e) => {
            if(playlist.length === 0) return;
            const width = progressContainer.clientWidth;
            const clickX = e.offsetX;
            const duration = audioPlayer.duration;
            audioPlayer.currentTime = (clickX / width) * duration;
        });

        // Helper to format seconds into M:SS
        function formatTime(seconds) {
            const min = Math.floor(seconds / 60);
            const sec = Math.floor(seconds % 60);
            return `${min}:${sec < 10 ? '0' + sec : sec}`;
        }
    </script>
</body>
</html>
