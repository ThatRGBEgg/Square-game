<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Square Chaser</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 40px; left: 20px; color: white; font-size: 24px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">Score: 0</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');

        let score = 0;
        let box = { x: 100, y: 100, size: 60, color: '#ff3b30' };

        // Resize canvas to fit iPhone screen
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            moveBox();
        }

        function moveBox() {
            box.x = Math.random() * (canvas.width - box.size);
            box.y = Math.random() * (canvas.height - box.size);
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = box.color;
            // Draw a rounded square (looks better on iOS)
            ctx.beginPath();
            ctx.roundRect(box.x, box.y, box.size, box.size, 10);
            ctx.fill();
            requestAnimationFrame(draw);
        }

        // Handle Touch
        canvas.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            if (touch.clientX > box.x && touch.clientX < box.x + box.size &&
                touch.clientY > box.y && touch.clientY < box.y + box.size) {
                score++;
                ui.innerText = `Score: ${score}`;
                moveBox();
                // haptic feedback feel (vibration)
                if (navigator.vibrate) navigator.vibrate(50);
            }
        });

        window.addEventListener('resize', resize);
        resize();
        draw();
    </script>
</body>
</html>
